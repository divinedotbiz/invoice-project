<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice History - Simple Invoice Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: var(--background);
      min-height: 100vh;
    }
    .history-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .history-title {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: color var(--transition);
    }
    .back-btn:hover {
      color: var(--primary);
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--surface);
      padding: 1.25rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      text-align: center;
    }
    .stat-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-label {
      font-size: 0.875rem;
      color: var(--secondary);
      margin-top: 0.25rem;
    }
    .invoice-table {
      width: 100%;
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .invoice-table th {
      background: var(--background);
      padding: 1rem;
      text-align: left;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--secondary);
      border-bottom: 1px solid var(--border);
    }
    .invoice-table td {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .invoice-table tr:last-child td {
      border-bottom: none;
    }
    .invoice-table tr:hover {
      background: var(--background);
    }
    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: capitalize;
    }
    .status-draft { background: #f1f5f9; color: #64748b; }
    .status-sent { background: #dbeafe; color: #2563eb; }
    .status-viewed { background: #fef3c7; color: #d97706; }
    .status-paid { background: #dcfce7; color: #16a34a; }
    .status-overdue { background: #fee2e2; color: #dc2626; }
    .status-cancelled { background: #f1f5f9; color: #94a3b8; }
    .amount {
      font-weight: 600;
      font-size: 1rem;
    }
    .invoice-actions {
      display: flex;
      gap: 0.5rem;
    }
    .empty-history {
      text-align: center;
      padding: 4rem 2rem;
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }
    .empty-history svg {
      width: 64px;
      height: 64px;
      color: var(--secondary);
      opacity: 0.5;
      margin-bottom: 1rem;
    }
    .filter-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .filter-bar .form-select {
      width: auto;
      min-width: 150px;
    }
    .search-input {
      flex: 1;
      min-width: 200px;
    }
    @media (max-width: 768px) {
      .invoice-table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo">
          <div class="logo-icon">I</div>
          <span class="logo-text">Invoice Generator</span>
        </a>
        <div class="header-actions">
          <a href="index.html" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            New Invoice
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="history-container">
    <div class="history-header">
      <div class="history-title">
        <a href="index.html" class="back-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </a>
        <h1>Invoice History</h1>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="total-invoices">0</div>
        <div class="stat-label">Total Invoices</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="total-draft">0</div>
        <div class="stat-label">Drafts</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="total-sent">0</div>
        <div class="stat-label">Sent</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="total-paid">0</div>
        <div class="stat-label">Paid</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="total-overdue">0</div>
        <div class="stat-label">Overdue</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <select id="status-filter" class="form-select" onchange="historyApp.filterInvoices()">
        <option value="">All Status</option>
        <option value="draft">Draft</option>
        <option value="sent">Sent</option>
        <option value="viewed">Viewed</option>
        <option value="paid">Paid</option>
        <option value="overdue">Overdue</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <input type="text" id="search-input" class="form-input search-input" placeholder="Search by invoice number or client name..." oninput="historyApp.filterInvoices()">
    </div>

    <!-- Invoice List -->
    <div id="invoice-list">
      <!-- Invoices will be rendered here -->
    </div>
  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="js/utils.js"></script>
  <script src="js/calculator.js"></script>
  <script>
    const historyApp = {
      invoices: [],

      init() {
        this.loadInvoices();
        this.renderStats();
        this.renderInvoices();
      },

      loadInvoices() {
        this.invoices = JSON.parse(localStorage.getItem('saved_invoices') || '[]');
        // Sort by date descending
        this.invoices.sort((a, b) => new Date(b.savedAt) - new Date(a.savedAt));
      },

      renderStats() {
        document.getElementById('total-invoices').textContent = this.invoices.length;
        document.getElementById('total-draft').textContent = this.invoices.filter(i => i.status === 'draft').length;
        document.getElementById('total-sent').textContent = this.invoices.filter(i => i.status === 'sent').length;
        document.getElementById('total-paid').textContent = this.invoices.filter(i => i.status === 'paid').length;
        document.getElementById('total-overdue').textContent = this.invoices.filter(i => i.status === 'overdue').length;
      },

      filterInvoices() {
        const statusFilter = document.getElementById('status-filter').value;
        const searchTerm = document.getElementById('search-input').value.toLowerCase();

        let filtered = this.invoices;

        if (statusFilter) {
          filtered = filtered.filter(i => i.status === statusFilter);
        }

        if (searchTerm) {
          filtered = filtered.filter(i => 
            (i.invoiceNumber || '').toLowerCase().includes(searchTerm) ||
            (i.clientName || '').toLowerCase().includes(searchTerm)
          );
        }

        this.renderInvoices(filtered);
      },

      renderInvoices(invoices = this.invoices) {
        const container = document.getElementById('invoice-list');

        if (invoices.length === 0) {
          container.innerHTML = `
            <div class="empty-history">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
              </svg>
              <h3>No invoices found</h3>
              <p>Create your first invoice to see it here.</p>
              <a href="index.html" class="btn btn-primary" style="margin-top: 1rem;">Create Invoice</a>
            </div>
          `;
          return;
        }

        container.innerHTML = `
          <table class="invoice-table">
            <thead>
              <tr>
                <th>Invoice #</th>
                <th>Client</th>
                <th>Date</th>
                <th>Due Date</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${invoices.map(inv => {
                const totals = Calculator.calculateAll(inv.lineItems || []);
                return `
                  <tr>
                    <td><strong>${Utils.escapeHtml(inv.invoiceNumber || 'N/A')}</strong></td>
                    <td>${Utils.escapeHtml(inv.clientName || 'N/A')}</td>
                    <td>${inv.issueDate || '-'}</td>
                    <td>${inv.dueDate || '-'}</td>
                    <td class="amount">${Utils.formatCurrency(totals.grandTotal, inv.currency || 'USD')}</td>
                    <td><span class="status-badge status-${inv.status || 'draft'}">${inv.status || 'draft'}</span></td>
                    <td>
                      <div class="invoice-actions">
                        <button class="btn btn-secondary btn-sm" onclick="historyApp.viewInvoice('${inv.id}')" title="View/Edit">
                          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                          </svg>
                        </button>
                        <button class="btn btn-secondary btn-sm" onclick="historyApp.duplicateInvoice('${inv.id}')" title="Duplicate">
                          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                          </svg>
                        </button>
                        <button class="btn btn-danger btn-sm" onclick="historyApp.deleteInvoice('${inv.id}')" title="Delete">
                          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                          </svg>
                        </button>
                      </div>
                    </td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        `;
      },

      viewInvoice(id) {
        // Store the invoice ID to load
        localStorage.setItem('load_invoice_id', id);
        window.location.href = 'index.html';
      },

      duplicateInvoice(id) {
        const invoice = this.invoices.find(i => i.id === id);
        if (!invoice) return;

        // Create a copy with new ID and number
        const newInvoice = { ...invoice };
        newInvoice.id = null;
        newInvoice.invoiceNumber = 'INV-' + new Date().getFullYear() + '-' + String(Math.floor(Math.random() * 10000)).padStart(4, '0');
        newInvoice.status = 'draft';
        newInvoice.savedAt = new Date().toISOString();

        // Save to history
        const history = JSON.parse(localStorage.getItem('saved_invoices') || '[]');
        history.unshift(newInvoice);
        localStorage.setItem('saved_invoices', JSON.stringify(history));

        this.loadInvoices();
        this.renderStats();
        this.renderInvoices();
        this.showToast('Invoice duplicated', 'success');
      },

      deleteInvoice(id) {
        if (!confirm('Are you sure you want to delete this invoice?')) return;

        const history = this.invoices.filter(i => i.id !== id);
        localStorage.setItem('saved_invoices', JSON.stringify(history));

        this.loadInvoices();
        this.renderStats();
        this.renderInvoices();
        this.showToast('Invoice deleted', 'success');
      },

      showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `
          <span class="toast-message">${message}</span>
          <button type="button" class="toast-close" onclick="this.parentElement.remove()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        `;
        
        container.appendChild(toast);
        
        setTimeout(() => {
          if (toast.parentElement) toast.remove();
        }, 3000);
      }
    };

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      historyApp.init();
    });
  </script>
</body>
</html>
